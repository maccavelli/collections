linters-settings:
  errcheck:
    check-tests: false
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (io.Writer).Write
      - recover

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
        - revive
        - gocritic
