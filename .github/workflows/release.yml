# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and Release

on:
  push:
    tags:
      - '*-v*' # Triggers on app prefix semantics e.g. prepare-commit-msg-v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract App Name
        id: parse
        run: |
          # GITHUB_REF is refs/tags/appname-vX.Y.Z
          TAG_NAME=${GITHUB_REF#refs/tags/}
          APP_NAME=${TAG_NAME%-v*}
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "Extracted App: $APP_NAME"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Binaries
        working-directory: ${{ steps.parse.outputs.APP_NAME }}
        run: |
          APP_NAME="${{ steps.parse.outputs.APP_NAME }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o "${APP_NAME}-macos-arm64" .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o "${APP_NAME}-macos-amd64" .
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o "${APP_NAME}-linux-amd64" .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o "${APP_NAME}-windows-amd64.exe" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          make_latest: true
          files: |
            ${{ steps.parse.outputs.APP_NAME }}/${{ steps.parse.outputs.APP_NAME }}-macos-arm64
            ${{ steps.parse.outputs.APP_NAME }}/${{ steps.parse.outputs.APP_NAME }}-macos-amd64
            ${{ steps.parse.outputs.APP_NAME }}/${{ steps.parse.outputs.APP_NAME }}-linux-amd64
            ${{ steps.parse.outputs.APP_NAME }}/${{ steps.parse.outputs.APP_NAME }}-windows-amd64.exe
